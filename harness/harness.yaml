              thin: no worked examples, no formal defs, missing deadlock/starvation/livelock)."
    - "1.17 — COST TRACKING + DASHBOARD. src/llm.py now captures per-call token usage AND the real
              OpenRouter dollar cost (request payload sets usage.include=true; anthropic path records
              tokens only). Per-run accumulator (llm.reset_usage/usage_records/usage_totals); each
              complete() call is labelled (generate/revise/judge/distill). pipeline.run resets at
              start, and at the end logs a run record via new src/gen_log.py -> outputs/
