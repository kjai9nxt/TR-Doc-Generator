              the higher slide ceiling; generator.revise(enforce_time=) drops the '40-min budget'
              line when off; llm_judge adds a depth-mode note so conciseness/slide-style judge filler
              not brevity; run_sets skips the deterministic conciseness set when the limit is off (so
              a rich doc is not false-failed or fed to self-evolution). Limit ON = unchanged concise
