    - "1.18 — RECENCY DATE + COURSE TYPE, GOOGLE LOGIN, MULTI-USER ADMIN DASHBOARD. (a) Connect step
              now asks a reference date (default today, editable) + course type (semester=deep theory
              / interview-targeted); saved via src/app_settings.py (knowledge_base/app_settings.json,
              set on /api/sync, shown in /api/status) and injected into every generation by
              context_builder.recency_and_course_type_block() — recency 'current as of DATE, no
