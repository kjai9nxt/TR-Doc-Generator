              (all runs newest-first + summary: total runs/approved/cost/tokens); generate job result
              now carries cost. Frontend: Cost metric + expandable per-call breakdown on the result
              card, and a new 'Generated TR Docs — Dashboard' section (approved count, total cost/
              tokens, per-doc rows, click a row for its token/cost breakdown). Verified live: S19 doc
