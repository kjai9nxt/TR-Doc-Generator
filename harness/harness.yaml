    - "1.16 — DEPTH MODE: turning the 40-minute limit OFF now produces a fuller, teaching-complete
              doc instead of the same terse skeleton. New harness/depth_mode.md (config.depth_mode())
              is appended to the generation prompt when the limit is off — it OVERRIDES the concision
