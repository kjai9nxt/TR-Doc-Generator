    - "1.19 — MULTI-USER PLATFORM: SQLite + per-course/team tracking + LIVE status + SEPARATE ADMIN APP.
              (a) src/db.py (SQLite at knowledge_base/tr_app.db, thread-safe short-lived conns): tables
              users/teams/team_members/runs; one-time import of outputs/generation_log.json; query +
              per day/week/month aggregation + per-user rollups. (b) Runs now have a LIVE lifecycle:
              server creates a run row (status=running) on /api/generate, streams stage from pipeline
              on_event (db.update_stage), finishes it (done/error + cost/rubric/etc). Attributed to
              user + active course (app_settings.course_name, new connect field) + the user's team for
              that course. (c) 'course' is a LIGHT grouping label (one active KB/sheet-set still). (d)
              Teams are ADMIN-managed. (e) Endpoints: /api/dashboard + /api/my/history (own runs grouped
              by course, with downloadable outputs) + /api/my/teams (team's shared docs); admin-only
