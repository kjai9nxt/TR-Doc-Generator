name: CI

# Offline eval + frontend build run automatically on every push/PR (free, no API).
# The live eval is MANUAL only (Actions tab -> Run workflow) because it calls the
# model and costs credits — it needs an OPENROUTER_API_KEY repository secret.
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  offline-eval:
    name: Offline eval (golden regression, no API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run offline eval (golden through guardrails + time + invariants + extraction)
        run: python -m evals.run_eval

  frontend-build:
    name: Frontend build (Vite/React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install & build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  live-eval:
    name: Live eval (generates + judges, uses API) — manual only
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run live eval (needs OPENROUTER_API_KEY secret)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::error::OPENROUTER_API_KEY secret is not set — add it in Settings → Secrets → Actions."
            exit 1
          fi
          python -m evals.run_eval --live
